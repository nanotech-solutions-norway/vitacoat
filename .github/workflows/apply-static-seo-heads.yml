name: Apply static SEO heads

on:
  push:
    branches: [main]
    paths:
      - '.github/scripts/apply_static_seo_heads.py'
      - '.github/scripts/audit_static_seo.py'
      - '.github/workflows/apply-static-seo-heads.yml'
      - 'sitemap.xml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-static-seo-heads:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Apply static SEO metadata to HTML files
        run: python .github/scripts/apply_static_seo_heads.py

      - name: Audit static SEO coverage against sitemap
        run: python .github/scripts/audit_static_seo.py

      - name: Commit static SEO head changes and audit report
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: 'Apply and audit static VitaCoat SEO heads'
          file_pattern: '*.html **/*.html seo-static-audit.json'

# Governance note: this workflow exists to make crawler-visible metadata static, deterministic, audited, and version controlled.
# Re-run marker: audit all sitemap-listed canonical URLs.
